<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SoYU T&E 영업 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg: #0b0c13;
  --surface: #12141e;
  --surface2: #191c28;
  --surface3: #1f2233;
  --border: #252840;
  --border2: #2e3250;
  --text: #eceef5;
  --text2: #9ba3c0;
  --muted: #555e7a;
  --red: #e8192c;
  --red-dim: rgba(232,25,44,0.1);
  --red-bright: #ff3347;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.1);
  --yellow: #f59e0b;
  --yellow-dim: rgba(245,158,11,0.1);
  --orange: #f97316;
  --orange-dim: rgba(249,115,22,0.1);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.1);
  --purple: #8b5cf6;
  --r: 10px;
  --r-sm: 6px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
}

/* ── HEADER ── */
.hdr {
  position: sticky; top:0; z-index:200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 54px;
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 12px;
  justify-content: space-between;
}
.hdr-logo { display:flex; align-items:center; gap:10px; }
.logo-mark {
  background: var(--red); color:#fff;
  font-size:12px; font-weight:900;
  padding: 4px 8px; border-radius:5px;
  letter-spacing:0.5px;
}
.logo-name { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
.logo-name .so { color:var(--red); }
.logo-pipe { width:1px; height:18px; background:var(--border2); }
.logo-sub { font-size:11px; color:var(--muted); font-weight:500; }

.hdr-right { display:flex; align-items:center; gap:8px; }
.date-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:20px; padding:5px 12px;
  font-size:12px;
}
.date-pill label { color:var(--muted); font-size:11px; font-weight:600; }
.date-pill input[type=date] {
  background:transparent; border:none; color:var(--text);
  font-family:inherit; font-size:12px; outline:none; cursor:pointer;
  width:100px;
}
.btn-today {
  background:var(--red); color:#fff; border:none;
  border-radius:20px; padding:5px 12px;
  font-size:11px; font-weight:700; cursor:pointer;
  font-family:inherit; white-space:nowrap;
}

/* ── LAYOUT ── */
.wrap { padding:16px 20px; max-width:1600px; margin:0 auto; }

/* ── URGENT BANNER ── */
.urgent-section { margin-bottom:14px; }
.urgent-title {
  font-size:11px; font-weight:700; color:var(--muted);
  letter-spacing:0.5px; text-transform:uppercase;
  margin-bottom:8px; display:flex; align-items:center; gap:6px;
}
.urgent-title::before { content:''; width:3px; height:12px; background:var(--red); border-radius:2px; display:block; }
.urgent-count {
  background:var(--red); color:#fff;
  font-size:10px; font-weight:800;
  padding:1px 6px; border-radius:20px;
}
.urgent-cards { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
.urgent-cards::-webkit-scrollbar { display:none; }
.urgent-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px 14px;
  min-width:200px;
  flex-shrink:0;
  cursor:pointer;
  transition:border-color 0.15s;
  position:relative;
  overflow:hidden;
}
.urgent-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:2px;
}
.urgent-card.type-overdue::before { background:var(--red); }
.urgent-card.type-no-contact::before { background:var(--yellow); }
.urgent-card.type-soon::before { background:var(--orange); }
.urgent-card:hover { border-color:var(--border2); }
.urgent-card-type { font-size:10px; font-weight:700; letter-spacing:0.3px; margin-bottom:5px; }
.urgent-card.type-overdue .urgent-card-type { color:var(--red); }
.urgent-card.type-no-contact .urgent-card-type { color:var(--yellow); }
.urgent-card.type-soon .urgent-card-type { color:var(--orange); }
.urgent-card-company { font-size:13px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.urgent-card-sub { font-size:11px; color:var(--text2); display:flex; justify-content:space-between; align-items:center; gap:8px; }
.urgent-card-amt { font-size:12px; font-weight:700; color:var(--text); }
.urgent-empty { font-size:12px; color:var(--muted); padding:12px 0; }

/* ── KPI ── */
.kpi-row {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}
.kpi {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  position:relative; overflow:hidden;
}
.kpi::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
.kpi.k-total::after { background:var(--red); }
.kpi.k-success::after { background:var(--green); }
.kpi.k-pending::after { background:var(--yellow); }
.kpi.k-fail::after { background:rgba(100,110,140,0.6); }

.kpi-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.kpi-lbl { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.4px; text-transform:uppercase; }
.kpi-badge { font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px; }
.kpi.k-total .kpi-badge { background:var(--red-dim); color:var(--red); }
.kpi.k-success .kpi-badge { background:var(--green-dim); color:var(--green); }
.kpi.k-pending .kpi-badge { background:var(--yellow-dim); color:var(--yellow); }
.kpi.k-fail .kpi-badge { background:rgba(100,110,140,0.1); color:var(--text2); }

.kpi-num { font-size:38px; font-weight:800; letter-spacing:-2px; line-height:1; margin-bottom:4px; }
.kpi.k-total .kpi-num { color:var(--red); }
.kpi.k-success .kpi-num { color:var(--green); }
.kpi.k-pending .kpi-num { color:var(--yellow); }
.kpi.k-fail .kpi-num { color:var(--text2); }
.kpi-amt { font-size:12px; color:var(--muted); }
.kpi-amt strong { color:var(--text2); font-weight:600; }

/* ── MID ROW ── */
.mid-row {
  display:grid;
  grid-template-columns: 1fr 1fr 1.2fr;
  gap:10px;
  margin-bottom:14px;
}
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
}
.card-title {
  font-size:11px; font-weight:700; color:var(--muted);
  letter-spacing:0.5px; text-transform:uppercase;
  margin-bottom:12px; display:flex; align-items:center; gap:6px;
}
.card-title::before { content:''; width:3px; height:11px; background:var(--red); border-radius:2px; display:block; }

/* 담당자 성과 */
.writer-item { margin-bottom:10px; }
.writer-head { display:flex; justify-content:space-between; margin-bottom:4px; align-items:center; }
.writer-name { font-size:12px; font-weight:700; }
.writer-stats { display:flex; gap:6px; font-size:11px; }
.writer-stat-s { color:var(--green); font-weight:700; }
.writer-stat-p { color:var(--yellow); }
.writer-stat-f { color:var(--muted); }
.writer-bar-track { background:var(--surface2); border-radius:3px; height:5px; display:flex; overflow:hidden; gap:1px; }
.writer-bar-s { background:var(--green); height:100%; transition:width 0.5s ease; border-radius:2px; }
.writer-bar-p { background:var(--yellow); height:100%; transition:width 0.5s ease; }
.writer-bar-f { background:var(--border2); height:100%; transition:width 0.5s ease; border-radius:2px; }

/* 유입경로 성공률 */
.inflow-item { margin-bottom:9px; }
.inflow-head { display:flex; justify-content:space-between; margin-bottom:3px; }
.inflow-name { font-size:12px; color:var(--text2); }
.inflow-rate { font-size:11px; font-weight:700; }
.inflow-track { background:var(--surface2); border-radius:3px; height:5px; overflow:hidden; }
.inflow-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }

/* 설비 차트 */
.equip-item { margin-bottom:9px; }
.equip-head { display:flex; justify-content:space-between; margin-bottom:3px; }
.equip-name { font-size:12px; color:var(--text2); }
.equip-val { font-size:11px; color:var(--muted); }
.equip-track { background:var(--surface2); border-radius:3px; height:5px; overflow:hidden; }
.equip-fill { height:100%; border-radius:3px; background:var(--red); transition:width 0.5s ease; }

/* ── FILTERS ── */
.filter-wrap {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:10px 14px;
  margin-bottom:10px;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.f-lbl { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap; }
.f-div { width:1px; height:18px; background:var(--border2); margin:0 2px; flex-shrink:0; }
.f-group { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.fb {
  background:transparent; border:1px solid var(--border2);
  color:var(--text2); border-radius:20px;
  padding:3px 10px; font-size:11px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:all 0.12s;
  white-space:nowrap;
}
.fb:hover { border-color:var(--text2); color:var(--text); }
.fb.on { background:var(--surface3); font-weight:700; }
.fb.on.c-red { border-color:var(--red); color:var(--red); }
.fb.on.c-green { border-color:var(--green); color:var(--green); }
.fb.on.c-yellow { border-color:var(--yellow); color:var(--yellow); }
.fb.on.c-gray { border-color:var(--text2); color:var(--text2); }
.fb.on.c-blue { border-color:var(--blue); color:var(--blue); }
.f-sel {
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--text); border-radius:var(--r-sm);
  padding:3px 8px; font-size:11px; cursor:pointer;
  font-family:inherit; outline:none; height:26px;
}

/* ── TABLE ── */
.tbl-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
}
.tbl-hdr {
  padding:12px 16px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border);
  gap:10px;
}
.tbl-hdr-l { display:flex; align-items:center; gap:8px; }
.tbl-ttl { font-size:13px; font-weight:700; }
.tbl-cnt {
  font-size:11px; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border2);
  border-radius:20px; padding:2px 8px;
}
.srch-wrap { position:relative; }
.srch-ico { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:12px; pointer-events:none; }
.srch {
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--text); border-radius:var(--r-sm);
  padding:5px 10px 5px 28px; font-size:12px;
  font-family:inherit; outline:none; width:200px;
  transition:border-color 0.15s;
}
.srch:focus { border-color:var(--red); }
.srch::placeholder { color:var(--muted); }

table { width:100%; border-collapse:collapse; }
thead th {
  padding:8px 12px; text-align:left;
  color:var(--muted); font-size:10px; font-weight:700;
  letter-spacing:0.5px; text-transform:uppercase;
  background:var(--surface2); border-bottom:1px solid var(--border);
  white-space:nowrap; position:sticky; top:54px; z-index:10;
  cursor:pointer; user-select:none; transition:color 0.12s;
}
thead th:hover { color:var(--text2); }
tbody tr { border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--surface2); }
tbody td { padding:10px 12px; vertical-align:middle; }

.td-co { font-weight:700; font-size:13px; }
.td-prod { font-size:11px; color:var(--text2); max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.td-amt { font-weight:800; white-space:nowrap; font-size:13px; }
.td-writer { font-size:12px; color:var(--text2); white-space:nowrap; }
.td-date { font-size:11px; color:var(--muted); white-space:nowrap; }

/* tags */
.tag { display:inline-block; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:700; white-space:nowrap; }
.tag-corp { background:var(--blue-dim); color:var(--blue); }
.tag-person { background:rgba(139,92,246,0.1); color:var(--purple); }
.tag-short { background:var(--yellow-dim); color:var(--yellow); }
.tag-long { background:var(--green-dim); color:var(--green); }
.tag-success { background:var(--green-dim); color:var(--green); }
.tag-ps { background:var(--yellow-dim); color:var(--yellow); }
.tag-pl { background:var(--blue-dim); color:var(--blue); }
.tag-fail { background:rgba(100,110,140,0.1); color:var(--text2); }

/* contact / deadline badges */
.cb { display:inline-flex; align-items:center; font-size:11px; padding:3px 7px; border-radius:var(--r-sm); font-weight:600; white-space:nowrap; }
.cb-ok { background:var(--green-dim); color:var(--green); }
.cb-warn { background:var(--yellow-dim); color:var(--yellow); }
.cb-over { background:var(--red-dim); color:var(--red); }
.cb-gray { background:var(--surface2); color:var(--muted); }

.db { display:inline-flex; align-items:center; gap:3px; font-size:11px; padding:3px 7px; border-radius:var(--r-sm); font-weight:600; white-space:nowrap; flex-direction:column; align-items:flex-start; gap:1px; }
.db-ok { background:var(--green-dim); color:var(--green); }
.db-near { background:var(--yellow-dim); color:var(--yellow); }
.db-over { background:var(--red-dim); color:var(--red); }
.db-done { background:var(--green-dim); color:var(--green); }
.db-fail { background:rgba(100,110,140,0.1); color:var(--muted); }
.db-date { font-size:10px; opacity:0.7; font-weight:400; }

/* inflow */
.ifl { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; }
.ifl-yt { background:rgba(255,70,70,0.1); color:#ff6b6b; }
.ifl-da { background:var(--blue-dim); color:var(--blue); }
.ifl-bl { background:rgba(139,92,246,0.1); color:var(--purple); }
.ifl-sh { background:var(--green-dim); color:var(--green); }
.ifl-ex { background:var(--yellow-dim); color:var(--yellow); }
.ifl-et { background:var(--surface3); color:var(--text2); }

/* ── MODAL ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.65); z-index:1000;
  align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
}
.overlay.on { display:flex; }
.modal {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  width:640px; max-width:95vw; max-height:90vh;
  overflow-y:auto; padding:26px 28px; position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,0.6);
}
.modal-x {
  position:absolute; top:16px; right:16px;
  background:var(--surface2); border:1px solid var(--border2);
  color:var(--muted); width:28px; height:28px;
  border-radius:50%; cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.modal-x:hover { color:var(--text); border-color:var(--text2); }
.modal-tags { display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap; }
.modal-co { font-size:22px; font-weight:800; margin-bottom:16px; letter-spacing:-0.5px; line-height:1.2; }
.modal-stat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.modal-stat {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:10px 12px;
  display:flex; align-items:center; gap:8px;
}
.modal-stat-ico { font-size:16px; }
.modal-stat-lbl { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:0.3px; text-transform:uppercase; margin-bottom:2px; }
.modal-stat-val { font-size:13px; font-weight:700; }
.modal-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.modal-info-item label { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:0.4px; text-transform:uppercase; display:block; margin-bottom:3px; }
.modal-info-val { font-size:13px; font-weight:600; }
.modal-info-val.big { color:var(--red); font-size:20px; font-weight:800; }
.modal-product { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:14px; }
.modal-prod-lbl { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:0.4px; text-transform:uppercase; margin-bottom:6px; }
.modal-hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
.hist-ttl { font-size:11px; color:var(--yellow); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }
.hist-entry { border-left:2px solid var(--border2); padding:8px 12px; margin-bottom:8px; border-radius:0 var(--r-sm) var(--r-sm) 0; transition:border-color 0.15s; }
.hist-entry:hover { border-left-color:var(--red); }
.hist-dt { font-size:11px; color:var(--red); font-weight:700; margin-bottom:3px; }
.hist-txt { font-size:12px; color:var(--text2); line-height:1.65; white-space:pre-wrap; }

/* ── LOADING / EMPTY ── */
.loading { text-align:center; padding:80px 20px; color:var(--muted); }
.spinner { width:30px; height:30px; border:2px solid var(--border2); border-top-color:var(--red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:50px 20px; color:var(--muted); font-size:13px; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── MOBILE ── */
@media(max-width:768px) {
  .hdr { padding:0 14px; height:50px; }
  .logo-pipe, .logo-sub { display:none; }
  .date-pill label { display:none; }
  .date-pill input[type=date] { width:90px; }
  .wrap { padding:12px 10px; }

  .kpi-row { grid-template-columns:1fr 1fr; gap:8px; }
  .kpi-num { font-size:30px; }
  .kpi { padding:12px; }

  .urgent-card { min-width:170px; }

  .mid-row { grid-template-columns:1fr; gap:8px; }

  .filter-wrap { overflow-x:auto; flex-wrap:nowrap; padding:8px 12px; gap:6px; }
  .f-group { flex-wrap:nowrap; }

  /* 테이블 → 카드 */
  .tbl-hdr { padding:10px 12px; }
  .srch { width:150px; }
  table, thead, tbody, th, td, tr { display:block; }
  thead { display:none; }
  tbody tr {
    border:1px solid var(--border);
    border-radius:var(--r);
    margin:7px 8px;
    padding:12px;
    background:var(--surface2);
  }
  tbody td {
    padding:3px 0; border:none;
    display:flex; align-items:flex-start; gap:6px;
  }
  tbody td::before {
    content:attr(data-label);
    font-size:10px; color:var(--muted);
    font-weight:700; letter-spacing:0.3px;
    text-transform:uppercase;
    min-width:56px; flex-shrink:0; padding-top:1px;
  }
  .td-co { font-size:14px; }
  .td-amt { color:var(--red); }
  td.hide-m { display:none; }

  .modal { border-radius:14px 14px 0 0; max-height:92vh; padding:20px 16px; }
  .overlay.on { align-items:flex-end; }
  .modal-co { font-size:18px; }
  .modal-stat-row { grid-template-columns:1fr 1fr; }
  .modal-info-grid { grid-template-columns:1fr; }
}
@media(max-width:420px) {
  .kpi-num { font-size:26px; }
  .kpi-lbl { font-size:10px; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <div class="logo-mark">SoYU</div>
    <div class="logo-name"><span class="so">So</span>YU T&amp;E</div>
    <div class="logo-pipe"></div>
    <div class="logo-sub">영업 대시보드</div>
  </div>
  <div class="hdr-right">
    <div class="date-pill">
      <label>기준일</label>
      <input type="date" id="baseDate">

<script>
const SHEET_ID = '18t4kHYrmyg793WWVmp7G2TCuiBnomZ_1eh_U7YRXLyQ';
const TABS = {
  '개인단기':   { biz:'person', period:'short', status:'pending' },
  '개인장기':   { biz:'person', period:'long',  status:'pending' },
  '법인단기':   { biz:'corp',   period:'short', status:'pending' },
  '법인장기':   { biz:'corp',   period:'long',  status:'pending' },
  '개인수주성공':{ biz:'person', period:null,   status:'success' },
  '법인수주성공':{ biz:'corp',   period:null,   status:'success' },
  '개인수주실패':{ biz:'person', period:null,   status:'fail' },
  '법인수주실패':{ biz:'corp',   period:null,   status:'fail' },
};

const CHART_COLORS = ['#e8192c','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#f97316','#38bdf8','#4ade80'];

let allData = [], filtered = [];
let filters = { biz:'all', period:'all', status:'all' };
let sortCol = null, sortDir = 1;
let baseDate = new Date();

// ── Date helpers ──
function setToday() {
  baseDate = new Date();
  document.getElementById('baseDate').value = formatDate(baseDate);
  applyFilters();
}
function formatDate(d) { return d.toISOString().slice(0,10); }

function parseDate(str) {
  if (!str) return null;
  const s = str.trim().replace(/\./g,'/').replace(/-/g,'/');
  const m2 = s.match(/^(\d{2})\/(\d{1,2})\/(\d{1,2})$/);
  if (m2) return new Date(2000 + +m2[1], +m2[2]-1, +m2[3]);
  const m4 = s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m4) return new Date(+m4[1], +m4[2]-1, +m4[3]);
  return null;
}

function daysDiff(d) {
  if (!d) return null;
  return Math.floor((baseDate - d) / 86400000);
}

function parseLastModDate(str) {
  if (!str) return null;
  const m4 = str.match(/(\d{4})\/(\d{2})\/(\d{2})/);
  if (m4) return new Date(+m4[1], +m4[2]-1, +m4[3]);
  const m2 = str.match(/^(\d{2})\/(\d{2})\/(\d{2})/);
  if (m2) return new Date(2000 + +m2[1], +m2[2]-1, +m2[3]);
  return null;
}

function fmtAmt(n) {
  if (!n) return '0원';
  if (n >= 100000000) return (n/100000000).toFixed(1)+'억';
  if (n >= 10000) return Math.round(n/10000)+'만원';
  return n.toLocaleString()+'원';
}

function getWriter(r) {
  return (r['작성자']||r['마지막수정자']||'').replace(/ (대리|이사|주임|팀장|과장|사원|부장)/g,'').trim();
}

function extractProductType(r) {
  const n = (r['품목명(요약)']||r['견적명']||'').toLowerCase();
  if (n.includes('랩핑')) return '랩핑기';
  if (n.includes('테핑')||n.includes('테이핑')) return '테이핑기';
  if (n.includes('밴딩')||n.includes('밴드')) return '밴딩기/밴드';
  if (n.includes('스트레치')||n.includes('필름')) return '스트레치필름';
  if (n.includes('박스')) return '박스포장라인';
  if (n.includes('코일')) return '코일랩핑기';
  return '기타';
}

// ── Fetch ──
async function fetchTab(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    return parseCSV(await r.text(), tabName);
  } catch(e) { return []; }
}

function parseCSV(text, tabName) {
  const allLines = text.split('\n');
  const lines = [];
  let cur = '', inQ = false;
  for (const l of allLines) {
    for (const c of l) { if (c==='"') inQ=!inQ; }
    cur += (cur?'\n':'')+l;
    if (!inQ) { lines.push(cur); cur=''; }
  }
  if (cur) lines.push(cur);

  const meta = TABS[tabName];
  const o = (tabName==='개인단기') ? 1 : 0;
  const rows = [];

  for (const line of lines) {
    const v = parseCSVLine(line);
    if (!v||v.length<10) continue;
    const dateNo = clean(v[0]);
    const company = clean(v[2+o]);
    if (!dateNo.match(/^\d{4}\/\d{2}\/\d{2}/)&&!dateNo.match(/^\d{2}-\d{2}-\d{2}/)) continue;
    if (!company) continue;

    rows.push({
      '일자-No.':         dateNo,
      '거래처명':          company,
      '유입경로':          clean(v[3+o]),
      '고객명':            clean(v[4+o]),
      '고객연락처':        clean(v[5+o]),
      '거래처담당자':      clean(v[6+o]),
      '작성자':            clean(v[7+o]),
      '견적명':            clean(v[8+o]),
      '품목명(요약)':      clean(v[9+o]),
      '금액합계(VAT포함)': clean(v[12+o]).replace(/[^0-9]/g,''),
      '진행상태':          clean(v[13+o]),
      '수주예상일':        clean(v[14+o]),
      '지역':              clean(v[16+o]),
      '견적결과(보고)':    clean(v[17+o]),
      '최종수정일시':      clean(v[23+o]),
      '마지막수정자':      clean(v[24+o]),
      _biz: meta.biz, _period: meta.period,
      _status: meta.status, _tab: tabName,
    });
  }
  return rows;
}

function clean(v) { return (v||'').trim().replace(/^"|"$/g,''); }

function parseCSVLine(line) {
  const result=[]; let cur='', inQ=false;
  for (const c of line) {
    if (c==='"') inQ=!inQ;
    else if (c===','&&!inQ) { result.push(cur); cur=''; }
    else cur+=c;
  }
  result.push(cur);
  return result;
}

// ── Load ──
async function loadAll() {
  const results = await Promise.all(Object.keys(TABS).map(fetchTab));
  allData = results.flat();

  const writers = [...new Set(allData.map(r=>getWriter(r)).filter(Boolean))].sort();
  const inflows = [...new Set(allData.map(r=>r['유입경로']||'').filter(Boolean))].sort();
  const wSel = document.getElementById('writerFilter');
  writers.forEach(w => { const o=document.createElement('option'); o.value=w; o.textContent=w; wSel.appendChild(o); });
  const iSel = document.getElementById('inflowFilter');
  inflows.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; iSel.appendChild(o); });

  document.getElementById('loadingView').style.display='none';
  document.getElementById('dashContent').style.display='block';
  applyFilters();
}

// ── Filters ──
function setFilter(type, val, btn) {
  filters[type] = val;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => {
    b.classList.remove('on','c-red','c-green','c-yellow','c-gray','c-blue');
  });
  btn.classList.add('on','c-red');
  applyFilters();
}

function applyFilters() {
  const writer = document.getElementById('writerFilter').value;
  const inflow = document.getElementById('inflowFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  const bd = document.getElementById('baseDate').value;
  if (bd) baseDate = new Date(bd);

  filtered = allData.filter(r => {
    if (filters.biz!=='all'&&r._biz!==filters.biz) return false;
    if (filters.period!=='all'&&r._status==='pending'&&r._period!==filters.period) return false;
    if (filters.status!=='all'&&r._status!==filters.status) return false;
    if (writer!=='all'&&getWriter(r)!==writer) return false;
    if (inflow!=='all'&&(r['유입경로']||'')!==inflow) return false;
    if (search) {
      const hay=((r['거래처명']||'')+(r['품목명(요약)']||'')+(r['견적명']||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderUrgent();
  renderKPI();
  renderCharts();
  renderTable();
}

// ── Urgent ──
function renderUrgent() {
  const pending = allData.filter(r=>r._status==='pending');
  const urgent = [];

  pending.forEach((r,idx) => {
    const ddDate = parseDate(r['수주예상일']||'');
    const ddDiff = ddDate ? Math.floor((ddDate-baseDate)/86400000) : null;
    const lastMod = parseLastModDate(r['최종수정일시']||'');
    const contactDays = daysDiff(lastMod);
    const amt = +r['금액합계(VAT포함)']||0;

    if (ddDiff!==null&&ddDiff<0) {
      urgent.push({ type:'overdue', label:'수주예상일 초과', r, sub:`D+${Math.abs(ddDiff)} 초과`, amt });
    } else if (contactDays!==null&&contactDays>=7) {
      urgent.push({ type:'no-contact', label:`${contactDays}일째 미연락`, r, sub:'연락 필요', amt });
    } else if (ddDiff!==null&&ddDiff<=3&&ddDiff>=0) {
      urgent.push({ type:'soon', label:`D-${ddDiff} 임박`, r, sub:'수주예상일 임박', amt });
    }
  });

  // sort by amount desc
  urgent.sort((a,b)=>b.amt-a.amt);

  document.getElementById('urgentCount').textContent = urgent.length;
  const container = document.getElementById('urgentCards');

  if (urgent.length===0) {
    container.innerHTML='<div class="urgent-empty">긴급 건 없음 ✅</div>';
    return;
  }

  container.innerHTML = urgent.map((u,i)=>`
    <div class="urgent-card type-${u.type}" onclick="openModalByRow(${allData.indexOf(u.r)})">
      <div class="urgent-card-type">${u.label}</div>
      <div class="urgent-card-company">${u.r['거래처명']}</div>
      <div class="urgent-card-sub">
        <span>${u.sub}</span>
        <span class="urgent-card-amt">${fmtAmt(u.amt)}</span>
      </div>
    </div>
  `).join('');
}

// ── KPI ──
function renderKPI() {
  const total = filtered.length;
  const success = filtered.filter(r=>r._status==='success');
  const pending = filtered.filter(r=>r._status==='pending');
  const fail = filtered.filter(r=>r._status==='fail');
  const sum = arr=>arr.reduce((s,r)=>s+(+r['금액합계(VAT포함)']||0),0);

  document.getElementById('kT-cnt').textContent=total+'건';
  document.getElementById('kT-amt').textContent=fmtAmt(sum(filtered));
  document.getElementById('kT-pct').textContent='전체';
  document.getElementById('kS-cnt').textContent=success.length+'건';
  document.getElementById('kS-amt').textContent=fmtAmt(sum(success));
  document.getElementById('kS-pct').textContent=total?Math.round(success.length/total*100)+'%':'0%';
  document.getElementById('kP-cnt').textContent=pending.length+'건';
  document.getElementById('kP-amt').textContent=fmtAmt(sum(pending));
  document.getElementById('kP-pct').textContent=total?Math.round(pending.length/total*100)+'%':'0%';
  document.getElementById('kF-cnt').textContent=fail.length+'건';
  document.getElementById('kF-amt').textContent=fmtAmt(sum(fail));
  document.getElementById('kF-pct').textContent=total?Math.round(fail.length/total*100)+'%':'0%';
}

// ── Charts ──
function renderCharts() {
  // 담당자별
  const wMap = {};
  filtered.forEach(r=>{
    const w=getWriter(r)||'미지정';
    if(!wMap[w]) wMap[w]={s:0,p:0,f:0,amt:0};
    wMap[w][r._status==='success'?'s':r._status==='fail'?'f':'p']++;
    wMap[w].amt+=(+r['금액합계(VAT포함)']||0);
  });
  const wArr=Object.entries(wMap).sort((a,b)=>b[1].amt-a[1].amt);
  document.getElementById('writerChart').innerHTML = wArr.length===0
    ? '<div style="color:var(--muted);font-size:12px">데이터 없음</div>'
    : wArr.map(([name,d])=>{
        const total=d.s+d.p+d.f||1;
        const sp=Math.round(d.s/total*100), pp=Math.round(d.p/total*100), fp=100-sp-pp;
        return `<div class="writer-item">
          <div class="writer-head">
            <span class="writer-name">${name}</span>
            <div class="writer-stats">
              <span class="writer-stat-s">✓${d.s}</span>
              <span class="writer-stat-p">◐${d.p}</span>
              <span class="writer-stat-f">✗${d.f}</span>
            </div>
          </div>
          <div class="writer-bar-track">
            <div class="writer-bar-s" style="width:${sp}%"></div>
            <div class="writer-bar-p" style="width:${pp}%"></div>
            <div class="writer-bar-f" style="width:${fp}%"></div>
          </div>
        </div>`;
      }).join('');

  // 유입경로 성공률
  const iMap = {};
  filtered.forEach(r=>{
    const k=(r['유입경로']||'기타').trim()||'기타';
    if(!iMap[k]) iMap[k]={total:0,success:0};
    iMap[k].total++;
    if(r._status==='success') iMap[k].success++;
  });
  const iArr=Object.entries(iMap).filter(([,d])=>d.total>=1).sort((a,b)=>b[1].success/b[1].total-a[1].success/a[1].total);
  document.getElementById('inflowChart').innerHTML = iArr.length===0
    ? '<div style="color:var(--muted);font-size:12px">데이터 없음</div>'
    : iArr.map(([name,d],i)=>{
        const rate=Math.round(d.success/d.total*100);
        const color=rate>=50?'var(--green)':rate>=25?'var(--yellow)':'var(--red)';
        return `<div class="inflow-item">
          <div class="inflow-head">
            <span class="inflow-name">${name} <span style="color:var(--muted);font-size:10px">${d.total}건</span></span>
            <span class="inflow-rate" style="color:${color}">${rate}%</span>
          </div>
          <div class="inflow-track">
            <div class="inflow-fill" style="width:${rate}%;background:${color}"></div>
          </div>
        </div>`;
      }).join('');

  // 설비 유형
  const eMap = {};
  filtered.forEach(r=>{
    const k=extractProductType(r);
    if(!eMap[k]) eMap[k]={cnt:0,amt:0};
    eMap[k].cnt++; eMap[k].amt+=(+r['금액합계(VAT포함)']||0);
  });
  const eArr=Object.entries(eMap).sort((a,b)=>b[1].amt-a[1].amt);
  const maxAmt=eArr[0]?.[1].amt||1;
  document.getElementById('equipChart').innerHTML = eArr.length===0
    ? '<div style="color:var(--muted);font-size:12px">데이터 없음</div>'
    : eArr.map(([name,d],i)=>`
        <div class="equip-item">
          <div class="equip-head">
            <span class="equip-name">${name}</span>
            <span class="equip-val">${d.cnt}건 · ${fmtAmt(d.amt)}</span>
          </div>
          <div class="equip-track">
            <div class="equip-fill" style="width:${Math.round(d.amt/maxAmt*100)}%;background:${CHART_COLORS[i%CHART_COLORS.length]}"></div>
          </div>
        </div>`).join('');
}

// ── Sort ──
function sortBy(col) {
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  renderTable();
}
function getSortVal(r,col) {
  if(col==='contact') { const d=parseLastModDate(r['최종수정일시']||''); return d?d.getTime():0; }
  if(col==='deadline') { const d=parseDate(r['수주예상일']||''); return d?d.getTime():99999999999; }
  if(col==='amount') return +(r['금액합계(VAT포함)']||0);
  if(col==='date') { const d=parseDate((r['일자-No.']||'').split(' ')[0]); return d?d.getTime():0; }
  if(col==='company') return r['거래처명']||'';
  if(col==='writer') return getWriter(r);
  return '';
}

// ── Table ──
function renderTable() {
  document.getElementById('tableCount').textContent=`총 ${filtered.length}건`;

  let data=[...filtered];
  if(sortCol) {
    data.sort((a,b)=>{
      const va=getSortVal(a,sortCol), vb=getSortVal(b,sortCol);
      return va<vb?-sortDir:va>vb?sortDir:0;
    });
  }

  if(data.length===0) {
    document.getElementById('tableBody').innerHTML='<div class="empty">조건에 맞는 견적이 없어요</div>';
    return;
  }

  const si=(col)=>sortCol!==col?'<span style="opacity:0.3;margin-left:3px">⇅</span>':sortDir===1?'<span style="color:var(--red);margin-left:3px">↑</span>':'<span style="color:var(--red);margin-left:3px">↓</span>';
  const th=(col,lbl)=>`<th onclick="sortBy('${col}')">${lbl}${si(col)}</th>`;

  let html=`<table><thead><tr>
    ${th('date','일자')} ${th('company','거래처')}
    <th>품목</th> <th>유입</th>
    ${th('amount','금액')} ${th('writer','담당')}
    ${th('contact','연락')} ${th('deadline','수주예상일')}
    <th>상태</th>
  </tr></thead><tbody>`;

  data.forEach((r,i)=>{
    const globalIdx = allData.indexOf(r);
    const dateStr=(r['일자-No.']||'').split(' ')[0];
    const lastMod=parseLastModDate(r['최종수정일시']||'');
    const contactDays=daysDiff(lastMod);
    const ddDate=parseDate(r['수주예상일']||'');
    const ddDiff=ddDate?Math.floor((ddDate-baseDate)/86400000):null;
    const bizTag=r._biz==='corp'?'<span class="tag tag-corp">법인</span>':'<span class="tag tag-person">개인</span>';
    const periodTag=r._period?(r._period==='short'?'<span class="tag tag-short">단기</span>':'<span class="tag tag-long">장기</span>'):'';

    // contact badge
    let cb;
    if(contactDays===null) cb='<span class="cb cb-gray">–</span>';
    else if(contactDays===0) cb='<span class="cb cb-ok">오늘</span>';
    else if(contactDays<=3) cb=`<span class="cb cb-ok">${contactDays}일 전</span>`;
    else if(contactDays<=7) cb=`<span class="cb cb-warn">${contactDays}일 전</span>`;
    else cb=`<span class="cb cb-over">${contactDays}일 전 ⚠</span>`;

    // deadline badge
    const ddStr=(r['수주예상일']||'').trim().replace(/\//g,'.').slice(-5);
    let db;
    if(r._status==='success') db='<span class="db db-done">✓ 수주완료</span>';
    else if(r._status==='fail') db='<span class="db db-fail">✗ 실패</span>';
    else if(ddDiff===null) db='<span class="db cb-gray">–</span>';
    else if(ddDiff<0) db=`<span class="db db-over">D+${Math.abs(ddDiff)} 초과<div class="db-date">${ddStr}</div></span>`;
    else if(ddDiff===0) db=`<span class="db db-over">오늘 마감!<div class="db-date">${ddStr}</div></span>`;
    else if(ddDiff<=7) db=`<span class="db db-near">D-${ddDiff}<div class="db-date">${ddStr}</div></span>`;
    else db=`<span class="db db-ok">D-${ddDiff}<div class="db-date">${ddStr}</div></span>`;

    // inflow
    const inf=r['유입경로']||'';
    const icls=inf.includes('유튜브')?'ifl-yt':inf.includes('다소유')?'ifl-da':inf.includes('블로그')?'ifl-bl':(inf.includes('쇼핑몰')||inf.includes('홈페이지'))?'ifl-sh':inf.includes('기존')?'ifl-ex':'ifl-et';

    // status
    let stag;
    if(r._status==='success') stag='<span class="tag tag-success">✓ 성공</span>';
    else if(r._status==='fail') stag='<span class="tag tag-fail">✗ 실패</span>';
    else if(r._period==='long') stag='<span class="tag tag-pl">장기가망</span>';
    else stag='<span class="tag tag-ps">단기가망</span>';

    html+=`<tr onclick="openModalByRow(${globalIdx})">
      <td class="td-date hide-m" data-label="일자">${dateStr}</td>
      <td data-label="거래처">
        <div class="td-co">${r['거래처명']||''}</div>
        <div style="display:flex;gap:3px;margin-top:3px">${bizTag}${periodTag}</div>
      </td>
      <td class="td-prod" data-label="품목">${r['품목명(요약)']||r['견적명']||''}</td>
      <td data-label="유입"><span class="ifl ${icls}">${inf||'–'}</span></td>
      <td class="td-amt" data-label="금액">${fmtAmt(+r['금액합계(VAT포함)']||0)}</td>
      <td class="td-writer" data-label="담당">${getWriter(r)}</td>
      <td data-label="연락">${cb}</td>
      <td data-label="수주예상">${db}</td>
      <td data-label="상태">${stag}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('tableBody').innerHTML=html;
}

// ── Modal ──
function openModalByRow(idx) {
  const r=allData[idx];
  if(!r) return;
  openModalContent(r);
}
function openModal(idx) {
  openModalContent(filtered[idx]);
}
function openModalContent(r) {
  if(!r) return;
  const ddDate=parseDate(r['수주예상일']||'');
  const ddDiff=ddDate?Math.floor((ddDate-baseDate)/86400000):null;
  const lastMod=parseLastModDate(r['최종수정일시']||'');
  const contactDays=daysDiff(lastMod);
  const ddStr=(r['수주예상일']||'').trim();

  let ddText='–';
  if(r._status==='success') ddText='✓ 수주 완료';
  else if(r._status==='fail') ddText='✗ 실패';
  else if(ddDiff!==null) {
    if(ddDiff<0) ddText=`<span style="color:var(--red)">D+${Math.abs(ddDiff)} 초과 ⚠</span>`;
    else if(ddDiff===0) ddText=`<span style="color:var(--red)">오늘 마감!</span>`;
    else ddText=`D-${ddDiff}`;
  }

  const bizTag=r._biz==='corp'?'<span class="tag tag-corp">법인</span>':'<span class="tag tag-person">개인</span>';
  const periodTag=r._period?(r._period==='short'?'<span class="tag tag-short">단기</span>':'<span class="tag tag-long">장기</span>'):'';
  let stag;
  if(r._status==='success') stag='<span class="tag tag-success">✓ 성공</span>';
  else if(r._status==='fail') stag='<span class="tag tag-fail">✗ 실패</span>';
  else stag=r._period==='long'?'<span class="tag tag-pl">장기가망</span>':'<span class="tag tag-ps">단기가망</span>';

  const inf=r['유입경로']||'';
  const icls=inf.includes('유튜브')?'ifl-yt':inf.includes('다소유')?'ifl-da':inf.includes('블로그')?'ifl-bl':(inf.includes('쇼핑몰')||inf.includes('홈페이지'))?'ifl-sh':inf.includes('기존')?'ifl-ex':'ifl-et';

  const hists=parseHistory(r['견적결과(보고)']||'');

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-tags">${bizTag}${periodTag}${stag}</div>
    <div class="modal-co">${r['거래처명']||''}</div>
    <div class="modal-stat-row">
      <div class="modal-stat">
        <span class="modal-stat-ico">📞</span>
        <div><div class="modal-stat-lbl">마지막 연락</div>
        <div class="modal-stat-val">${contactDays===null?'–':contactDays===0?'오늘':contactDays+'일 전'}</div></div>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-ico">📅</span>
        <div><div class="modal-stat-lbl">수주예상일</div>
        <div class="modal-stat-val">${ddStr||'–'}</div></div>
      </div>
      <div class="modal-stat">
        <span class="modal-stat-ico">⏱</span>
        <div><div class="modal-stat-lbl">D-day</div>
        <div class="modal-stat-val">${ddText}</div></div>
      </div>
    </div>
    <div class="modal-info-grid">
      <div class="modal-info-item"><label>견적 일자</label><div class="modal-info-val">${(r['일자-No.']||'').split(' ')[0]}</div></div>
      <div class="modal-info-item"><label>금액 (VAT포함)</label><div class="modal-info-val big">${(+r['금액합계(VAT포함)']||0).toLocaleString()}원</div></div>
      <div class="modal-info-item"><label>작성자</label><div class="modal-info-val">${r['작성자']||getWriter(r)}</div></div>
      <div class="modal-info-item"><label>지역</label><div class="modal-info-val">${r['지역']||'–'}</div></div>
      <div class="modal-info-item"><label>고객 연락처</label><div class="modal-info-val">${r['고객연락처']||'–'}</div></div>
      <div class="modal-info-item"><label>유입경로</label><div class="modal-info-val"><span class="ifl ${icls}">${inf||'–'}</span></div></div>
    </div>
    <div class="modal-prod-lbl">최종 품목 내역</div>
    <div class="modal-product">${r['품목명(요약)']||r['견적명']||'–'}</div>
    <hr class="modal-hr">
    <div class="hist-ttl">📞 영업 상담 히스토리</div>
    ${hists.length===0?'<div style="color:var(--muted);font-size:12px">기록 없음</div>':hists.map(h=>`
      <div class="hist-entry">
        ${h.date?`<div class="hist-dt">${h.date}</div>`:''}
        <div class="hist-txt">${h.text}</div>
      </div>`).join('')}
  `;
  document.getElementById('modalOverlay').classList.add('on');
}

function parseHistory(text) {
  if(!text) return [];
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const entries=[]; let cur=null;
  lines.forEach(line=>{
    const m=line.match(/^(\d{1,2}\.\d{1,2}|기록)/);
    if(m) {
      if(cur) entries.push(cur);
      cur={date:m[0], text:line.replace(/^(\d{1,2}\.\d{1,2}|기록)\s*[-–]?\s*/,'')};
    } else { if(cur) cur.text+='\n'+line; else cur={date:null,text:line}; }
  });
  if(cur) entries.push(cur);
  return entries.length?entries:[{date:null,text:text}];
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('on'); }
function closeModalOutside(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

// ── Init ──
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('baseDate').value=formatDate(new Date());
  document.getElementById('baseDate').addEventListener('change', applyFilters);
  loadAll();
});
</script>
