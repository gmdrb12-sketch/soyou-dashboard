<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoYU T&E 영업 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0d0e14;
    --surface: #13151f;
    --surface2: #1c1e2c;
    --surface3: #222535;
    --border: #272a3a;
    --border2: #303450;
    --text: #eceef5;
    --text2: #a8aec8;
    --muted: #5c6180;
    --accent: #e8192c;
    --accent2: #ff4757;
    --accent-dim: rgba(232,25,44,0.12);
    --success: #22c55e;
    --success-dim: rgba(34,197,94,0.12);
    --warning: #f59e0b;
    --warning-dim: rgba(245,158,11,0.12);
    --danger: #ef4444;
    --danger-dim: rgba(239,68,68,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --purple: #8b5cf6;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    backdrop-filter: blur(12px);
  }

  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .logo-so { color: var(--accent); font-weight: 800; }
  .logo-yu { color: #fff; font-weight: 800; }
  .logo-te { color: var(--text2); font-weight: 600; font-size: 13px; margin-left: 1px; }
  .logo-text { font-size: 16px; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--border2); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .date-control {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
  }
  .date-control label { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .date-control input[type="date"] {
    background: transparent; border: none; color: var(--text);
    font-family: inherit; font-size: 12px; cursor: pointer; outline: none;
  }
  .date-today-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 4px 10px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: inherit; letter-spacing: 0.3px;
    transition: opacity 0.15s;
  }
  .date-today-btn:hover { opacity: 0.85; }

  /* ── Main ── */
  .main { padding: 20px 32px; max-width: 1680px; margin: 0 auto; }

  /* ── KPI ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: var(--border2); }
  .kpi-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.total::after { background: var(--accent); }
  .kpi-card.success::after { background: var(--success); }
  .kpi-card.pending::after { background: var(--warning); }
  .kpi-card.fail::after { background: var(--danger); }

  .kpi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .kpi-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .kpi-pct-badge {
    font-size: 11px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px;
  }
  .kpi-card.total .kpi-pct-badge { background: var(--accent-dim); color: var(--accent); }
  .kpi-card.success .kpi-pct-badge { background: var(--success-dim); color: var(--success); }
  .kpi-card.pending .kpi-pct-badge { background: var(--warning-dim); color: var(--warning); }
  .kpi-card.fail .kpi-pct-badge { background: var(--danger-dim); color: var(--danger); }

  .kpi-count { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; margin-bottom: 4px; }
  .kpi-card.total .kpi-count { color: var(--accent); }
  .kpi-card.success .kpi-count { color: var(--success); }
  .kpi-card.pending .kpi-count { color: var(--warning); }
  .kpi-card.fail .kpi-count { color: var(--danger); }

  .kpi-amount { font-size: 12px; color: var(--muted); }
  .kpi-amount strong { color: var(--text2); font-weight: 600; }

  /* ── Filter Bar ── */
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-section { display: flex; align-items: center; gap: 6px; }
  .filter-label { color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
  .filter-divider { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }

  .btn-filter {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-filter:hover { border-color: var(--text2); color: var(--text); }
  .btn-filter.active { background: var(--surface3); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .btn-filter.active.s-success { border-color: var(--success); color: var(--success); }
  .btn-filter.active.s-warning { border-color: var(--warning); color: var(--warning); }
  .btn-filter.active.s-danger { border-color: var(--danger); color: var(--danger); }

  .filter-select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    outline: none;
    height: 28px;
  }
  .filter-select:focus { border-color: var(--accent); }

  /* ── Charts ── */
  .charts-row {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .chart-card-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chart-card-title::before {
    content: '';
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .bar-item { margin-bottom: 8px; }
  .bar-meta { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 12px; }
  .bar-name { color: var(--text2); }
  .bar-val { color: var(--muted); font-size: 11px; }
  .bar-track { background: var(--surface2); border-radius: 3px; height: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

  .pie-container { display: flex; align-items: center; gap: 20px; }
  .pie-legend { flex: 1; min-width: 0; }
  .pie-legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; font-size: 12px; }
  .pie-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pie-legend-name { color: var(--text2); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pie-legend-val { color: var(--muted); font-size: 11px; white-space: nowrap; }

  /* ── Table Card ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .table-header-left { display: flex; align-items: center; gap: 8px; }
  .table-title { font-size: 13px; font-weight: 700; }
  .table-count {
    font-size: 11px; color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2px 8px;
  }

  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 6px 12px 6px 30px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 9px 14px;
    text-align: left;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 56px;
    z-index: 10;
  }
  thead th:hover { color: var(--text2); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 14px; vertical-align: middle; }

  .td-date { font-size: 11px; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .td-company { font-weight: 700; font-size: 13px; color: var(--text); }
  .td-product { font-size: 11px; color: var(--text2); max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .td-amount { font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; font-size: 13px; }
  .td-writer { font-size: 12px; color: var(--text2); }

  /* ── Tags ── */
  .tag {
    display: inline-block; padding: 2px 7px;
    border-radius: 4px; font-size: 11px;
    font-weight: 700; white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .tag-corp { background: var(--blue-dim); color: var(--blue); }
  .tag-person { background: rgba(139,92,246,0.12); color: var(--purple); }
  .tag-short { background: var(--warning-dim); color: var(--warning); }
  .tag-long { background: var(--success-dim); color: var(--success); }
  .tag-success { background: var(--success-dim); color: var(--success); }
  .tag-pending-s { background: var(--warning-dim); color: var(--warning); }
  .tag-pending-l { background: var(--blue-dim); color: var(--blue); }
  .tag-fail { background: var(--danger-dim); color: var(--danger); }

  /* ── Contact Badge ── */
  .contact-badge {
    display: inline-flex; align-items: center;
    font-size: 11px; padding: 3px 8px;
    border-radius: var(--radius-sm); white-space: nowrap;
    font-weight: 600;
  }
  .contact-badge.ok { background: var(--success-dim); color: var(--success); }
  .contact-badge.warn { background: var(--warning-dim); color: var(--warning); }
  .contact-badge.over { background: var(--danger-dim); color: var(--danger); }

  /* ── Deadline Badge ── */
  .deadline-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 3px 8px;
    border-radius: var(--radius-sm); font-weight: 600;
    white-space: nowrap;
  }
  .deadline-badge.ok { background: var(--success-dim); color: var(--success); }
  .deadline-badge.near { background: var(--warning-dim); color: var(--warning); }
  .deadline-badge.over { background: var(--danger-dim); color: var(--danger); }

  /* ── Inflow ── */
  .inflow {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-weight: 600;
  }
  .inflow-youtube { background: rgba(255,70,70,0.12); color: #ff6b6b; }
  .inflow-dasoyou { background: var(--blue-dim); color: var(--blue); }
  .inflow-blog { background: rgba(139,92,246,0.12); color: var(--purple); }
  .inflow-shop { background: var(--success-dim); color: var(--success); }
  .inflow-existing { background: var(--warning-dim); color: var(--warning); }
  .inflow-other { background: var(--surface3); color: var(--text2); }

  /* ── Loading ── */
  .loading { text-align: center; padding: 80px 20px; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  .loading-text { font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }
  .empty-text { font-size: 13px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 640px; max-width: 95vw;
    max-height: 88vh;
    overflow-y: auto;
    padding: 28px 30px;
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .modal-close {
    position: absolute; top: 18px; right: 18px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--muted); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--text2); }

  .modal-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .modal-title {
    font-size: 22px; font-weight: 800;
    margin-bottom: 18px; letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .status-badges {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 18px;
  }
  .status-badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
  }
  .status-badge .icon { font-size: 18px; }
  .sb-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; margin-bottom: 2px; }
  .sb-val { font-size: 13px; font-weight: 700; }

  .modal-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 16px;
  }
  .modal-field label {
    font-size: 10px; color: var(--muted);
    font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; display: block; margin-bottom: 3px;
  }
  .modal-field .val { font-size: 14px; font-weight: 600; color: var(--text); }
  .modal-field .val.amount { color: var(--accent); font-size: 20px; font-weight: 800; }

  .modal-product {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--text2);
  }
  .modal-product-label {
    font-size: 10px; color: var(--muted); font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 6px;
  }

  .modal-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  .history-section h4 {
    font-size: 11px; color: var(--warning);
    font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .history-entry {
    background: var(--surface2);
    border-left: 2px solid var(--border2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .history-entry:hover { border-left-color: var(--accent); }
  .history-date { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .history-text { font-size: 12px; color: var(--text2); line-height: 1.65; white-space: pre-wrap; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Mobile Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 0 16px; height: 52px; }
    .logo-sub { display: none; }
    .date-control label { display: none; }
    .main { padding: 14px 12px; }

    .kpi-grid {
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .kpi-card { padding: 14px 14px; }
    .kpi-count { font-size: 28px; }
    .kpi-amount { font-size: 11px; }

    .filter-bar {
      padding: 10px 12px;
      gap: 8px;
      overflow-x: auto;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .filter-section { flex-shrink: 0; }
    .filter-divider { flex-shrink: 0; }

    .charts-row {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .pie-container { flex-direction: column; align-items: flex-start; gap: 14px; }

    /* 테이블 → 카드형으로 변환 */
    .table-header { padding: 12px 14px; }
    .search-input { width: 160px; }

    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }

    tbody tr {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 8px 10px;
      padding: 14px;
      background: var(--surface2);
      cursor: pointer;
    }
    tbody tr:hover { background: var(--surface3); }
    tbody td {
      padding: 3px 0;
      border: none;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
    }
    tbody td::before {
      content: attr(data-label);
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      min-width: 64px;
      flex-shrink: 0;
      padding-top: 1px;
    }
    tbody td.td-hide { display: none; }
    .td-company { font-size: 14px !important; font-weight: 800 !important; }
    .td-amount { font-size: 14px !important; color: var(--accent) !important; }

    /* 모달 */
    .modal { padding: 20px 16px; border-radius: 12px 12px 0 0; max-height: 92vh; }
    .modal-overlay { align-items: flex-end; }
    .modal-title { font-size: 18px; }
    .modal-grid { grid-template-columns: 1fr; gap: 10px; }
    .status-badges { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 400px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .kpi-count { font-size: 24px; }
    .status-badges { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-area">
    <div class="logo-text">
      <span class="logo-so">So</span><span class="logo-yu">YU</span>
      <span class="logo-te">T&amp;E</span>
    </div>
    <span class="logo-sub">영업 대시보드</span>
  </div>
  <div class="header-right">
    <div class="date-control">
      <label>기준일</label>
      <input type="date" id="baseDate">
      <button class="date-today-btn" onclick="setToday()">오늘</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="loadingView" class="loading">
    <div class="spinner"></div>

<script>
// ── Config ──────────────────────────────────────────
const SHEET_ID = '18t4kHYrmyg793WWVmp7G2TCuiBnomZ_1eh_U7YRXLyQ';
const TABS = {
  '개인단기':   { biz: 'person', period: 'short', status: 'pending' },
  '개인장기':   { biz: 'person', period: 'long',  status: 'pending' },
  '법인단기':   { biz: 'corp',   period: 'short', status: 'pending' },
  '법인장기':   { biz: 'corp',   period: 'long',  status: 'pending' },
  '개인수주성공': { biz: 'person', period: null,  status: 'success' },
  '법인수주성공': { biz: 'corp',   period: null,  status: 'success' },
  '개인수주실패': { biz: 'person', period: null,  status: 'fail' },
  '법인수주실패': { biz: 'corp',   period: null,  status: 'fail' },
};

const PIE_COLORS = ['#4f8ef7','#34c97a','#f5a623','#a78bfa','#f05252','#38bdf8','#fb923c','#4ade80'];

let allData = [];
let filtered = [];
let sortCol = null;   // 현재 정렬 컬럼
let sortDir = 1;      // 1=오름차순, -1=내림차순
let filters = { biz: 'all', period: 'all', status: 'all' };
let baseDate = new Date();

// ── Date helpers ─────────────────────────────────────
function setToday() {
  baseDate = new Date();
  document.getElementById('baseDate').value = formatDate(baseDate);
  applyFilters();
}
function formatDate(d) {
  return d.toISOString().slice(0,10);
}
function parseDate(str) {
  if (!str) return null;
  const s = str.trim().replace(/\./g,'/').replace(/-/g,'/');
  // 26/06/30 형식 (2자리 연도, 구글시트 gviz 출력)
  const m2 = s.match(/^(\d{2})\/(\d{1,2})\/(\d{1,2})$/);
  if (m2) return new Date(2000 + +m2[1], +m2[2]-1, +m2[3]);
  // 2026/06/30 형식 (4자리 연도)
  const m4 = s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m4) return new Date(+m4[1], +m4[2]-1, +m4[3]);
  return null;
}
function daysDiff(d) {
  if (!d) return null;
  const ms = baseDate - d;
  return Math.floor(ms / 86400000);
}

// ── Fetch from Google Sheets ─────────────────────────
async function fetchTab(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const text = await r.text();
    return parseCSV(text, tabName);
  } catch(e) {
    console.warn('Tab not found or empty:', tabName);
    return [];
  }
}

function parseCSV(text, tabName) {
  // gviz CSV: no header row, data starts immediately
  // First rebuild logical lines (handle quoted newlines)
  const allLines = text.split('\n');
  const lines = [];
  let cur = '', inQ = false;
  for (const l of allLines) {
    for (const c of l) { if (c === '"') inQ = !inQ; }
    cur += (cur ? '\n' : '') + l;
    if (!inQ) { lines.push(cur); cur = ''; }
  }
  if (cur) lines.push(cur);

  const meta = TABS[tabName];
  const rows = [];

  // 개인단기: col[1]=내외자구분 추가 → offset +1
  // 나머지: offset 0
  // 확정 컬럼맵 (25컬럼 기준):
  // [0]일자-No. [1]사업자번호 [2]거래처명 [3]유입경로 [4]고객명 [5]고객연락처
  // [6]거래처담당자 [7]작성자 [8]견적명 [9]품목명(요약) [10]견적유효기간
  // [11]수량합계 [12]금액합계 [13]진행상태 [14]수주예상일 [15]대면영업여부
  // [16]지역 [17]견적결과(보고) [18]첨부 [19]생성한전표 [20]인쇄
  // [21]이메일 [22]FAX [23]최종수정일시 [24]마지막수정자
  const o = (tabName === '개인단기') ? 1 : 0;

  for (const line of lines) {
    const v = parseCSVLine(line);
    if (!v || v.length < 10) continue;

    const dateNo  = clean(v[0]);
    const company = clean(v[2 + o]);

    // 유효 데이터행: 날짜 형식 YYYY/MM/DD 이고 거래처명 존재
    if (!dateNo.match(/^\d{4}\/\d{2}\/\d{2}/) || !company) continue;

    const obj = {
      '일자-No.':         dateNo,
      '거래처명':          company,
      '유입경로':          clean(v[3 + o]),
      '고객명':            clean(v[4 + o]),
      '고객연락처':        clean(v[5 + o]),
      '거래처담당자':      clean(v[6 + o]),
      '작성자':            clean(v[7 + o]),
      '견적명':            clean(v[8 + o]),
      '품목명(요약)':      clean(v[9 + o]),
      '견적유효기간':      clean(v[10 + o]),
      '수량합계':          clean(v[11 + o]),
      '금액합계(VAT포함)': clean(v[12 + o]).replace(/[^0-9]/g, ''),
      '진행상태':          clean(v[13 + o]),
      '수주예상일':        clean(v[14 + o]),
      '지역':              clean(v[16 + o]),
      '견적결과(보고)':    clean(v[17 + o]),
      '최종수정일시':      clean(v[23 + o]),
      '마지막수정자':      clean(v[24 + o]),
      _biz:    meta.biz,
      _period: meta.period,
      _status: meta.status,
      _tab:    tabName,
    };
    rows.push(obj);
  }
  return rows;
}

function clean(v) {
  return (v || '').trim().replace(/^"|"$/g, '');
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

// ── Load all ─────────────────────────────────────────
async function loadAll() {
  const promises = Object.keys(TABS).map(tab => fetchTab(tab));
  const results = await Promise.all(promises);
  allData = results.flat();

  // Populate dropdowns
  const writers = [...new Set(allData.map(r => getWriter(r)).filter(Boolean))].sort();
  const inflows = [...new Set(allData.map(r => r['유입경로'] || '').filter(Boolean))].sort();

  const wSel = document.getElementById('writerFilter');
  writers.forEach(w => { const o = document.createElement('option'); o.value = w; o.textContent = w; wSel.appendChild(o); });

  const iSel = document.getElementById('inflowFilter');
  inflows.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; iSel.appendChild(o); });

  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';

  applyFilters();
}

function getWriter(r) {
  return (r['작성자'] || r['마지막수정자'] || '').replace(/ (대리|이사|주임|팀장|과장|사원|부장)/g,'').trim();
}

// ── Filters ──────────────────────────────────────────
function setFilter(type, val, btn) {
  filters[type] = val;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const writer = document.getElementById('writerFilter').value;
  const inflow = document.getElementById('inflowFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  baseDate = new Date(document.getElementById('baseDate').value);

  filtered = allData.filter(r => {
    if (filters.biz !== 'all' && r._biz !== filters.biz) return false;
    if (filters.period !== 'all') {
      if (r._status !== 'pending') {} // success/fail have no period
      else if (r._period !== filters.period) return false;
    }
    if (filters.status !== 'all' && r._status !== filters.status) return false;
    if (writer !== 'all' && getWriter(r) !== writer) return false;
    if (inflow !== 'all' && (r['유입경로']||'') !== inflow) return false;
    if (search) {
      const hay = ((r['거래처명']||'') + (r['품목명(요약)']||'') + (r['견적명']||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderKPI();
  renderCharts();
  renderTable();
}

// ── KPI ──────────────────────────────────────────────
function fmtAmt(n) {
  if (n >= 100000000) return (n/100000000).toFixed(1) + '억원';
  if (n >= 10000) return Math.round(n/10000) + '만원';
  return n.toLocaleString() + '원';
}

function renderKPI() {
  const total = filtered.length;
  const success = filtered.filter(r => r._status === 'success');
  const pending = filtered.filter(r => r._status === 'pending');
  const fail = filtered.filter(r => r._status === 'fail');

  const sum = arr => arr.reduce((s, r) => s + (+r['금액합계(VAT포함)'] || 0), 0);

  document.getElementById('kpiTotalCount').textContent = total + '건';
  document.getElementById('kpiTotalAmt').textContent = fmtAmt(sum(filtered));
  document.getElementById('kpiTotalPct').textContent = '전체';
  document.getElementById('kpiSuccessCount').textContent = success.length + '건';
  document.getElementById('kpiSuccessAmt').textContent = fmtAmt(sum(success));
  document.getElementById('kpiSuccessPct').textContent = total ? Math.round(success.length/total*100) + '%' : '0%';
  document.getElementById('kpiPendingCount').textContent = pending.length + '건';
  document.getElementById('kpiPendingAmt').textContent = fmtAmt(sum(pending));
  document.getElementById('kpiPendingPct').textContent = total ? Math.round(pending.length/total*100) + '%' : '0%';
  document.getElementById('kpiFailCount').textContent = fail.length + '건';
  document.getElementById('kpiFailAmt').textContent = fmtAmt(sum(fail));
  document.getElementById('kpiFailPct').textContent = total ? Math.round(fail.length/total*100) + '%' : '0%';
}

// ── Charts ───────────────────────────────────────────
function extractProductType(r) {
  const name = (r['품목명(요약)'] || r['견적명'] || '').toLowerCase();
  if (name.includes('랩핑') || name.includes('랩핑기')) return '랩핑기';
  if (name.includes('테핑') || name.includes('테이핑')) return '테이핑기';
  if (name.includes('밴딩') || name.includes('밴드')) return '밴딩기/밴드';
  if (name.includes('스트레치') || name.includes('필름')) return '스트레치필름';
  if (name.includes('박스')) return '박스포장라인';
  if (name.includes('코일')) return '코일랩핑기';
  return '기타';
}

function renderCharts() {
  // Product bar chart
  const prodMap = {};
  filtered.forEach(r => {
    const k = extractProductType(r);
    if (!prodMap[k]) prodMap[k] = { count: 0, amt: 0 };
    prodMap[k].count++;
    prodMap[k].amt += (+r['금액합계(VAT포함)'] || 0);
  });
  const prodArr = Object.entries(prodMap).sort((a,b) => b[1].amt - a[1].amt);
  const maxAmt = prodArr[0]?.[1].amt || 1;

  const barColors = ['#4f8ef7','#34c97a','#f5a623','#a78bfa','#f05252','#38bdf8'];
  let html = '';
  prodArr.forEach(([name, d], i) => {
    const pct = Math.round(d.amt / maxAmt * 100);
    html += `<div class="bar-item">
      <div class="bar-meta"><span class="bar-name">${name}</span><span class="bar-val">${d.count}건 · ${fmtAmt(d.amt)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColors[i%barColors.length]}"></div></div>
    </div>`;
  });
  document.getElementById('productChart').innerHTML = html || '<div style="color:var(--muted);font-size:13px;padding:20px">데이터 없음</div>';

  // Pie chart
  const inflowMap = {};
  filtered.forEach(r => {
    const k = (r['유입경로'] || '기타').trim() || '기타';
    inflowMap[k] = (inflowMap[k] || 0) + 1;
  });
  const inflowArr = Object.entries(inflowMap).sort((a,b) => b[1]-a[1]);
  const inflowTotal = inflowArr.reduce((s,[,v]) => s+v, 0);

  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 140, 140);
  if (inflowArr.length === 0) return;

  let startAngle = -Math.PI / 2;
  inflowArr.forEach(([name, cnt], i) => {
    const slice = (cnt / inflowTotal) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(70, 70);
    ctx.arc(70, 70, 60, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = PIE_COLORS[i % PIE_COLORS.length];
    ctx.fill();
    startAngle += slice;
  });
  // center hole
  ctx.beginPath();
  ctx.arc(70, 70, 32, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1d27';
  ctx.fill();
  ctx.fillStyle = '#e8eaf0';
  ctx.font = 'bold 16px Pretendard, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(inflowTotal, 70, 70);

  let legendHtml = '';
  inflowArr.forEach(([name, cnt], i) => {
    const pct = Math.round(cnt/inflowTotal*100);
    legendHtml += `<div class="pie-legend-item">
      <div class="pie-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></div>
      <span class="pie-legend-name">${name}</span>
      <span class="pie-legend-val">${cnt}건 (${pct}%)</span>
    </div>`;
  });
  document.getElementById('pieLegend').innerHTML = legendHtml;
}

// ── Sort ─────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderTable();
}

function getSortVal(r, col) {
  if (col === 'contact') {
    const d = parseLastModDate(r['최종수정일시'] || '');
    return d ? d.getTime() : 0;
  }
  if (col === 'deadline') {
    const d = parseDate(r['수주예상일'] || '');
    return d ? d.getTime() : 99999999999;
  }
  if (col === 'amount') return +(r['금액합계(VAT포함)'] || 0);
  if (col === 'date') {
    const d = parseDate((r['일자-No.'] || '').split(' ')[0]);
    return d ? d.getTime() : 0;
  }
  if (col === 'company') return r['거래처명'] || '';
  if (col === 'writer') return getWriter(r);
  return '';
}

// ── Table ─────────────────────────────────────────────
function renderTable() {
  document.getElementById('tableCount').textContent = `총 ${filtered.length}건`;
  if (filtered.length === 0) {
    document.getElementById('tableBody').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>조건에 맞는 견적이 없습니다</div></div>';
    return;
  }

  // Sort filtered
  if (sortCol) {
    filtered = [...filtered].sort((a, b) => {
      const va = getSortVal(a, sortCol), vb = getSortVal(b, sortCol);
      if (va < vb) return -1 * sortDir;
      if (va > vb) return 1 * sortDir;
      return 0;
    });
  }

  const sortIcon = (col) => {
    if (sortCol !== col) return '<span style="opacity:0.3;margin-left:4px">⇅</span>';
    return sortDir === 1 ? '<span style="color:var(--accent);margin-left:4px">↑</span>' : '<span style="color:var(--accent);margin-left:4px">↓</span>';
  };
  const th = (col, label) => `<th style="cursor:pointer;user-select:none" onclick="sortBy('${col}')">${label}${sortIcon(col)}</th>`;

  let html = `<table><thead><tr>
    ${th('date','일자')}
    <th>구분</th>
    ${th('company','거래처명')}
    <th>설비/품목</th>
    <th>유입경로</th>
    ${th('amount','금액')}
    ${th('writer','담당자')}
    ${th('contact','마지막 연락')}
    ${th('deadline','수주예상일')}
    <th>상태</th>
  </tr></thead><tbody>`;

  filtered.forEach((r, idx) => {
    const dateStr = (r['일자-No.'] || '').split(' ')[0];
    const lastModStr = r['최종수정일시'] || '';
    const lastModDate = parseLastModDate(lastModStr);
    const contactDays = daysDiff(lastModDate);
    const deadlineStr = r['수주예상일'] || '';
    const deadlineDate = parseDate(deadlineStr);
    const deadlineDiff = deadlineDate ? Math.floor((deadlineDate - baseDate) / 86400000) : null;

    const contactBadge = contactBadgeHtml(contactDays);
    const deadlineBadge = deadlineBadgeHtml(deadlineDiff, r._status, r['수주예상일']);
    const inflowBadge = inflowBadgeHtml(r['유입경로'] || '');
    const statusTag = statusTagHtml(r);
    const bizTag = r._biz === 'corp' ? '<span class="tag tag-corp">법인</span>' : '<span class="tag tag-person">개인</span>';
    const periodTag = r._period ? (r._period === 'short' ? '<span class="tag tag-short">단기</span>' : '<span class="tag tag-long">장기</span>') : '';

    html += `<tr onclick="openModal(${idx})">
      <td class="td-date td-hide" data-label="일자">${dateStr}</td>
      <td data-label="구분" style="white-space:nowrap">${bizTag} ${periodTag}</td>
      <td data-label="거래처"><div class="td-company">${r['거래처명']||''}</div></td>
      <td class="td-product" data-label="품목">${r['품목명(요약)']||r['견적명']||''}</td>
      <td data-label="유입">${inflowBadge}</td>
      <td class="td-amount" data-label="금액">${fmtAmt(+r['금액합계(VAT포함)']||0)}</td>
      <td class="td-writer" data-label="담당자">${getWriter(r)}</td>
      <td data-label="연락">${contactBadge}</td>
      <td data-label="수주예상">${deadlineBadge}</td>
      <td data-label="상태">${statusTag}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tableBody').innerHTML = html;
}

function parseLastModDate(str) {
  if (!str) return null;
  // 2026/06/15 형식
  const m4 = str.match(/(\d{4})\/(\d{2})\/(\d{2})/);
  if (m4) return new Date(+m4[1], +m4[2]-1, +m4[3]);
  // 26/06/15 형식 (2자리 연도)
  const m2 = str.match(/^(\d{2})\/(\d{2})\/(\d{2})/);
  if (m2) return new Date(2000 + +m2[1], +m2[2]-1, +m2[3]);
  return null;
}

function contactBadgeHtml(days) {
  if (days === null) return '<span class="contact-badge">–</span>';
  if (days === 0) return '<span class="contact-badge ok">오늘</span>';
  if (days <= 3) return `<span class="contact-badge ok">${days}일 전</span>`;
  if (days <= 7) return `<span class="contact-badge warn">${days}일 전</span>`;
  return `<span class="contact-badge over">${days}일 전 ⚠</span>`;
}

function deadlineBadgeHtml(diff, status, dateStr) {
  const date = dateStr ? dateStr.trim().replace(/\//g,'.').substring(2) : '';
  if (status === 'success') return '<span class="deadline-badge ok">✓ 수주완료</span>';
  if (status === 'fail') return '<span class="deadline-badge" style="background:rgba(240,82,82,0.1);color:var(--danger)">✗ 실패</span>';
  if (diff === null) return '<span class="deadline-badge">–</span>';
  if (diff < 0) return `<span class="deadline-badge over" title="${date}">D+${Math.abs(diff)} 초과 ⚠</span>`;
  if (diff === 0) return `<span class="deadline-badge over" title="${date}">오늘 마감 ⚠</span>`;
  if (diff <= 7) return `<span class="deadline-badge near" title="${date}">D-${diff} <span style="opacity:0.6;font-size:10px">${date}</span></span>`;
  return `<span class="deadline-badge ok">D-${diff} <span style="opacity:0.6;font-size:10px">${date}</span></span>`;
}

function inflowBadgeHtml(inflow) {
  const cls = inflow.includes('유튜브') ? 'inflow-youtube'
    : inflow.includes('다소유') || inflow.includes('다소유') ? 'inflow-dasoyou'
    : inflow.includes('블로그') ? 'inflow-blog'
    : inflow.includes('쇼핑몰') || inflow.includes('홈페이지') ? 'inflow-shop'
    : inflow.includes('기존') ? 'inflow-existing'
    : 'inflow-other';
  return `<span class="inflow ${cls}">${inflow || '–'}</span>`;
}

function statusTagHtml(r) {
  if (r._status === 'success') return '<span class="tag tag-success">✓ 성공</span>';
  if (r._status === 'fail') return '<span class="tag tag-fail">✗ 실패</span>';
  if (r._period === 'long') return '<span class="tag tag-pending-l">장기가망</span>';
  return '<span class="tag tag-pending-s">단기가망</span>';
}

// ── Modal ─────────────────────────────────────────────
function openModal(idx) {
  const r = filtered[idx];
  if (!r) return;

  const deadlineDate = parseDate(r['수주예상일'] || '');
  const deadlineDiff = deadlineDate ? Math.floor((deadlineDate - baseDate) / 86400000) : null;
  const lastModDate = parseLastModDate(r['최종수정일시'] || '');
  const contactDays = daysDiff(lastModDate);

  const histories = parseHistory(r['견적결과(보고)'] || '');

  const deadlineDateDisp = (r['수주예상일']||'').trim().replace(/\//g,'.').substring(2);
  let deadlineText = '–';
  if (deadlineDiff !== null) {
    if (r._status === 'success') deadlineText = '✓ 수주 완료';
    else if (deadlineDiff < 0) deadlineText = `<span style="color:var(--danger)">D+${Math.abs(deadlineDiff)} 초과 ⚠<br><small>${deadlineDateDisp}</small></span>`;
    else if (deadlineDiff === 0) deadlineText = `<span style="color:var(--danger)">오늘 마감 ⚠</span>`;
    else deadlineText = `D-${deadlineDiff} <small style="color:var(--muted)">(${deadlineDateDisp})</small>`;
  }

  const bizTag = r._biz === 'corp' ? '<span class="tag tag-corp">법인</span>' : '<span class="tag tag-person">개인</span>';
  const periodTag = r._period ? (r._period === 'short' ? '<span class="tag tag-short">단기</span>' : '<span class="tag tag-long">장기</span>') : '';
  const statusTag = statusTagHtml(r);

  let histHtml = '';
  histories.forEach(h => {
    histHtml += `<div class="history-entry">
      ${h.date ? `<div class="history-date">${h.date}</div>` : ''}
      <div class="history-text">${h.text}</div>
    </div>`;
  });

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-tags">${bizTag} ${periodTag} ${statusTag}</div>
    <div class="modal-title">${r['거래처명']||''}</div>

    <div class="status-badges">
      <div class="status-badge">
        <span class="icon">📞</span>
        <div>
          <div class="sb-label">마지막 연락</div>
          <div class="sb-val">${contactDays !== null ? (contactDays === 0 ? '오늘' : contactDays + '일 전') : '–'}</div>
        </div>
      </div>
      <div class="status-badge">
        <span class="icon">📅</span>
        <div>
          <div class="sb-label">수주예상일</div>
          <div class="sb-val">${(r['수주예상일']||'').trim() || '–'}</div>
        </div>
      </div>
      <div class="status-badge">
        <span class="icon">⏱</span>
        <div>
          <div class="sb-label">D-day</div>
          <div class="sb-val">${deadlineText}</div>
        </div>
      </div>
    </div>

    <div class="modal-grid">
      <div class="modal-field"><label>견적 일자</label><div class="val">${(r['일자-No.']||'').split(' ')[0]}</div></div>
      <div class="modal-field"><label>작성자</label><div class="val">${r['작성자']||getWriter(r)}</div></div>
      <div class="modal-field"><label>지역</label><div class="val">${r['지역']||'–'}</div></div>
      <div class="modal-field"><label>금액 (VAT포함)</label><div class="val amount">${(+r['금액합계(VAT포함)']||0).toLocaleString()}원</div></div>
      <div class="modal-field"><label>고객 연락처</label><div class="val">${r['고객연락처']||'–'}</div></div>
      <div class="modal-field"><label>유입경로</label><div class="val">${inflowBadgeHtml(r['유입경로']||'')}</div></div>
    </div>

    <div class="modal-field" style="margin-bottom:16px">
      <label>최종 품목 내역</label>
      <div class="val" style="font-size:14px;margin-top:6px;background:var(--surface2);border-radius:8px;padding:12px;line-height:1.6;">${r['품목명(요약)']||r['견적명']||'–'}</div>
    </div>

    <hr class="modal-divider">
    <div class="history-section">
      <h4>📞 영업 상담 히스토리</h4>
      ${histHtml || '<div style="color:var(--muted);font-size:13px">기록 없음</div>'}
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function parseHistory(text) {
  if (!text) return [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const entries = [];
  let cur = null;

  lines.forEach(line => {
    const dateMatch = line.match(/^(\d{1,2}\.\d{1,2}|기록)/);
    if (dateMatch) {
      if (cur) entries.push(cur);
      cur = { date: dateMatch[0], text: line.replace(/^(\d{1,2}\.\d{1,2}|기록)\s*[-–]?\s*/, '') };
    } else {
      if (cur) cur.text += '\n' + line;
      else cur = { date: null, text: line };
    }
  });
  if (cur) entries.push(cur);
  return entries.length ? entries : [{ date: null, text: text }];
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ── Init ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('baseDate').value = formatDate(new Date());
  document.getElementById('baseDate').addEventListener('change', applyFilters);
  loadAll();
});
</script>
